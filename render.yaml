services:
  - type: web
    name: vitascan-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ENABLE_RAG
        value: "true"
      - key: ENABLE_CHATBOT
        value: "true"
